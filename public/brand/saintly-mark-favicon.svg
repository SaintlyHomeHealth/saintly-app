<?xml version="1.0" encoding="UTF-8"?>
<!--
  Favicon / PWA master — vector source of truth. Bold strokes for 16–32px legibility.
  Outline PNG (saintly-logo-source.png) is reference only, not rasterized for icons.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Saintly Home Health">
  <defs>
    <style>
      .bg { fill: #0284c7; }
      .w { fill: #ffffff; }
      .hole { fill: #0284c7; }
      .arc {
        fill: none;
        stroke: #ffffff;
        /* ~10% of viewBox — stays ~3px+ at 32px raster */
        stroke-width: 52;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  <rect class="bg" width="512" height="512" rx="96" />
  <!-- Dome (thick stroke so it survives downsampling) -->
  <path class="arc" d="M 40 384 Q 256 52 472 384" />
  <!-- House silhouette -->
  <path class="w" d="M 256 208 L 152 318 L 152 416 L 360 416 L 360 318 Z" />
  <!-- Window + door cutouts -->
  <circle class="hole" cx="256" cy="292" r="30" />
  <rect class="hole" x="218" y="340" width="76" height="76" rx="10" />
  <!-- Single wide foundation (fewer thin lines at 16px) -->
  <rect class="w" x="72" y="432" width="368" height="36" rx="14" />
  <!-- Halo -->
  <ellipse class="w" cx="256" cy="142" rx="118" ry="44" />
</svg>
